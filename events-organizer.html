<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/logo.png" alt="Tucks logo">
  <meta name="theme-color" content="#2563eb">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(() => console.log('Service Worker Registered'));
      });
    }
  </script>
  <title>Tucks - Event Organizer</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="clothes/clothes-theme.css">
  <link rel="stylesheet" href="clothes/vendor-theme.css">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
  <style>
    .event-org-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 12px 38px rgba(15, 23, 42, 0.08);
    }

    .event-org-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .event-org-header h3 {
      margin: 0 0 6px;
      font-size: 1.2rem;
      color: #0f172a;
    }

    .event-org-meta {
      font-size: 0.88rem;
      color: #64748b;
    }

    .event-org-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 16px 0;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      margin-bottom: 16px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #2563eb;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 4px;
    }

    .event-org-body {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 0.92rem;
    }

    .event-org-body div {
      color: #475569;
    }

    .btn-expand {
      width: 100%;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-expand:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .registration-card {
      background: #f8fbff;
      border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .registration-card.confirmed {
      background: #f0fdf4;
      border-color: rgba(16, 185, 129, 0.12);
    }

    .registration-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .registration-header h4 {
      margin: 0 0 4px;
      font-size: 0.95rem;
      color: #0f172a;
    }

    .registration-meta {
      font-size: 0.8rem;
      color: #64748b;
    }

    .registration-body {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      font-size: 0.88rem;
      margin-bottom: 12px;
    }

    .registration-body div {
      color: #475569;
    }

    .btn-confirm {
      width: 100%;
      padding: 10px 12px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-confirm:hover {
      background: #059669;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
    }

    .tab-btn {
      padding: 12px 18px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: #64748b;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .tab-btn.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .scanner-wrapper {
      background: #111;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 18px;
      height: 360px;
    }

    .scanner-input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 18px;
    }

    .status-pill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pill.active {
      background: rgba(16, 185, 129, 0.12);
      color: #10b981;
    }

    .status-pill.pending {
      background: rgba(59, 130, 246, 0.12);
      color: #3b82f6;
    }

    .status-pill.success {
      background: rgba(16, 185, 129, 0.12);
      color: #10b981;
    }

    @media (max-width: 720px) {
      .event-org-stats {
        grid-template-columns: 1fr;
      }

      .registration-body {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-wrap: wrap;
      }

      .scanner-wrapper {
        height: 280px;
      }
    }
  </style>
</head>
<body class="vendor-page">
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="vendor-shell page-wrap">
    <header class="site-header" style="margin-bottom:16px">
      <a href="/tickets.html" class="logo">
        <img src="/logo.png" alt="Tucks" class="logo-img" width="36" height="36">
        <span class="logo-text">Tucks</span>
      </a>
      <div style="font-size:0.85rem;font-weight:700;color:var(--accent)">Event Organizer Dashboard</div>
    </header>

    <div class="card vendor-card" id="loginSection">
      <h2>Event Organizer Login</h2>
      <p class="sub">Enter your email to access your events and manage registrations.</p>
      <div class="form-row">
        <label for="organizerEmail">Email Address</label>
        <input id="organizerEmail" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="vendor-actions">
        <button class="btn" id="loginBtn">Access Dashboard</button>
        <a class="btn ghost" href="/tickets.html">Back</a>
      </div>
      <div id="loginError" style="margin-top:12px; display:none; color:#b91c1c;"></div>
    </div>

    <div class="card vendor-card" id="dashboardSection" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div>
          <h2>My Events</h2>
          <p class="sub" style="margin:6px 0 0;">Manage your uploaded events and track registrations.</p>
        </div>
        <button class="btn" id="logoutBtn">Logout</button>
      </div>

      <div id="eventsList" class="vendor-grid-2"></div>
    </div>

    <div class="card vendor-card" id="eventDetailSection" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <button class="btn ghost" id="backBtn">← Back to events</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="registrations">Registrations</button>
        <button class="tab-btn" data-tab="scanner">Scan Attendance</button>
      </div>

      <div id="registrations" class="tab-content active" style="min-height:200px;"></div>

      <div id="scanner" class="tab-content">
        <div class="scanner-wrapper" id="scannerContainer"></div>
        <div class="scanner-input-row">
          <input id="manualTicketId" type="text" placeholder="Or enter ticket ID manually">
          <button class="btn" id="verifyManualBtn">Verify</button>
        </div>
        <div id="scannerMessage"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { 
      getOrganizerEvents, 
      getEventRegistrations, 
      markAttendanceConfirmed,
      renderOrganizerEvents, 
      renderEventRegistrations 
    } from '/events-organizer.js';

    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const eventDetailSection = document.getElementById('eventDetailSection');
    const organizerEmailInput = document.getElementById('organizerEmail');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const backBtn = document.getElementById('backBtn');
    const loginError = document.getElementById('loginError');
    const eventsList = document.getElementById('eventsList');
    const registrationsContainer = document.getElementById('registrations');
    const scannerContainer = document.getElementById('scannerContainer');
    const manualTicketInput = document.getElementById('manualTicketId');
    const verifyManualBtn = document.getElementById('verifyManualBtn');
    const scannerMessage = document.getElementById('scannerMessage');

    let currentOrganizerEmail = null;
    let currentEvents = [];
    let currentRegistrations = {};
    let currentEventId = null;
    let html5QrcodeScanner = null;

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const tab = e.target.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(tab).classList.add('active');

        if (tab === 'scanner' && !html5QrcodeScanner) {
          initializeScanner();
        }
      });
    });

    const initializeScanner = () => {
      if (html5QrcodeScanner) return;
      try {
        html5QrcodeScanner = new Html5QrcodeScanner('scannerContainer', { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess, onScanError);
      } catch (error) {
        scannerMessage.textContent = 'Could not initialize camera. Check permissions.';
        scannerMessage.style.color = '#b91c1c';
      }
    };

    const onScanSuccess = async (decodedText) => {
      try {
        const payload = JSON.parse(decodedText);
        if (payload.ticketId) {
          await confirmTicket(payload.ticketId);
        }
      } catch (error) {
        // Not a JSON QR code, might be raw ticket ID
        await confirmTicket(decodedText);
      }
    };

    const onScanError = () => {
      // Ignore scan errors
    };

    const confirmTicket = async (ticketId) => {
      try {
        const ticket = Object.values(currentRegistrations[currentEventId] || {}).find(t => t.ticketId === ticketId);
        if (!ticket) {
          scannerMessage.textContent = 'Ticket not found for this event.';
          scannerMessage.style.color = '#b91c1c';
          return;
        }

        await markAttendanceConfirmed(ticket.id, currentEventId);
        scannerMessage.textContent = `✓ ${ticket.buyerName} - Attendance confirmed!`;
        scannerMessage.style.color = '#10b981';

        // Reload registrations
        await loadEventDetails(currentEventId);
      } catch (error) {
        scannerMessage.textContent = error.message;
        scannerMessage.style.color = '#b91c1c';
      }
    };

    loginBtn.addEventListener('click', async () => {
      const email = organizerEmailInput.value.trim();
      if (!email || !email.includes('@')) {
        loginError.textContent = 'Please enter a valid email address.';
        loginError.style.display = 'block';
        return;
      }

      loginError.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Loading…';

      try {
        const events = await getOrganizerEvents(email);
        currentOrganizerEmail = email;
        currentEvents = events;

        // Load registrations for all events
        const regs = {};
        for (const event of events) {
          regs[event.id] = await getEventRegistrations(event.id);
        }
        currentRegistrations = regs;

        loginSection.style.display = 'none';
        dashboardSection.style.display = 'block';
        renderOrganizerEvents(eventsList, events, regs);

        // Attach event listeners to expand buttons
        eventsList.querySelectorAll('.btn-expand').forEach(btn => {
          btn.addEventListener('click', () => loadEventDetails(btn.dataset.eventId));
        });
      } catch (error) {
        loginError.textContent = 'Could not load events. Try again later.';
        loginError.style.display = 'block';
        console.error(error);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Access Dashboard';
      }
    });

    const loadEventDetails = async (eventId) => {
      currentEventId = eventId;
      const event = currentEvents.find(e => e.id === eventId);
      if (!event) return;

      // Clear scanner
      if (html5QrcodeScanner) {
        html5QrcodeScanner.clear();
        html5QrcodeScanner = null;
      }
      manualTicketInput.value = '';
      scannerMessage.textContent = '';

      const regs = await getEventRegistrations(eventId);
      currentRegistrations[eventId] = regs;
      renderEventRegistrations(registrationsContainer, regs, event.title);

      // Add confirm listeners
      registrationsContainer.querySelectorAll('.btn-confirm').forEach(btn => {
        btn.addEventListener('click', async () => {
          await confirmTicket(btn.dataset.ticketId);
        });
      });

      dashboardSection.style.display = 'none';
      eventDetailSection.style.display = 'block';
    };

    backBtn.addEventListener('click', () => {
      eventDetailSection.style.display = 'none';
      dashboardSection.style.display = 'block';
      if (html5QrcodeScanner) {
        html5QrcodeScanner.clear();
        html5QrcodeScanner = null;
      }
    });

    logoutBtn.addEventListener('click', () => {
      dashboardSection.style.display = 'none';
      loginSection.style.display = 'block';
      organizerEmailInput.value = '';
      currentOrganizerEmail = null;
      currentEvents = [];
      currentRegistrations = {};
    });

    verifyManualBtn.addEventListener('click', async () => {
      const ticketId = manualTicketInput.value.trim();
      if (!ticketId) {
        scannerMessage.textContent = 'Enter a ticket ID.';
        scannerMessage.style.color = '#b91c1c';
        return;
      }
      await confirmTicket(ticketId);
    });

    organizerEmailInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="/home.html" class="nav-item"><i class='bx bxs-home'></i><span>Home</span></a>
    <a href="/cart.html" class="nav-item"><i class='bx bx-cart'></i><span>Cart</span></a>
    <a href="/order.html" class="nav-item"><i class='bx bx-history'></i><span>Orders</span></a>
    <a href="/profile.html" class="nav-item"><i class='bx bxs-user-circle'></i><span>Profile</span></a>
  </nav>
  <div class="bottom-nav-shadow" aria-hidden="true"></div>
</body>
</html>
