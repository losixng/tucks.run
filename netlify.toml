[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/verifyPayment"
  to = "/.netlify/functions/verifyPayment"
  status = 200

[[redirects]]
  from = "/api/listEvents"
  to = "/.netlify/functions/listEvents"
  status = 200

[[redirects]]
  from = "/api/publishEvent"
  to = "/.netlify/functions/publishEvent"
  status = 200

[[redirects]]
  from = "/api/purchaseTicket"
  to = "/.netlify/functions/purchaseTicket"
  status = 200

[[redirects]]
  from = "/api/verifyTicket"
  to = "/.netlify/functions/verifyTicket"
  status = 200

[[redirects]]
  from = "/api/getMyEvents"
  to = "/.netlify/functions/getMyEvents"
  status = 200

[[redirects]]
  from = "/api/getMyQrPass"
  to = "/.netlify/functions/getMyQrPass"
  status = 200

[[redirects]]
  from = "/api/eventConfig"
  to = "/.netlify/functions/eventConfig"
  status = 200

[[redirects]]
  from = "/api/getMyDeliveryPass"
  to = "/.netlify/functions/getMyDeliveryPass"
  status = 200

[[redirects]]
  from = "/api/checkDeliveryAccess"
  to = "/.netlify/functions/checkDeliveryAccess"
  status = 200

[[redirects]]
  from = "/api/verifyDeliveryPass"
  to = "/.netlify/functions/verifyDeliveryPass"
  status = 200

[[redirects]]
  from = "/api/markDeliveryComplete"
  to = "/.netlify/functions/markDeliveryComplete"
  status = 200
