<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="TUCKS - With you in every step of the journey">
<title>TUCKS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
--primary:#3BA7FF;--secondary:#89D7FF;--accent:#DDF4FF;--text:#0B1426;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,sans-serif;height:100vh;overflow:hidden;
background:linear-gradient(135deg,#fff,#eef9ff);
color:var(--text);
}
#bg{position:fixed;inset:0}
.aurora,.aurora:before,.aurora:after{
position:absolute;content:"";width:50vw;height:50vw;border-radius:50%;
filter:blur(70px);opacity:.35;animation:drift 18s ease-in-out infinite;
}
.aurora{background:#89D7FF;top:-10%;left:-10%}
.aurora:before{background:#3BA7FF;top:40%;left:80%}
.aurora:after{background:#DDF4FF;top:60%;left:20%}
@keyframes drift{50%{transform:translate(80px,-40px) scale(1.15)}}

.wrap{
position:relative;z-index:2;height:100vh;
display:flex;align-items:center;justify-content:center;flex-direction:column;
text-align:center;padding:24px;
}
.logo{
width:140px;margin-bottom:20px;
filter:drop-shadow(0 20px 40px rgba(59,167,255,.25));
animation:float 5s ease-in-out infinite;
}
.title{
font-size:min(12vw,8rem);font-weight:900;letter-spacing:.15em;
color:#fff;
text-shadow:
0 1px 0 #fff,0 2px 0 #dff3ff,0 3px 0 #c9eaff,
0 12px 30px rgba(59,167,255,.25),
0 25px 80px rgba(59,167,255,.35);
opacity:0;
animation:intro 1.5s forwards .8s, rotate3d 10s ease-in-out infinite 2.2s;
transform-style:preserve-3d;
}
.tagline{
font-size:clamp(1.1rem,2vw,1.6rem);
font-weight:800;color:#1177c8;margin-top:10px;
}
.card{
margin-top:30px;max-width:800px;padding:30px;
background:rgba(255,255,255,.6);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.8);
border-radius:28px;
box-shadow:0 20px 60px rgba(59,167,255,.12);
opacity:0;animation:intro 1.2s forwards 1.5s;
}
.footer{
position:fixed;bottom:18px;width:100%;text-align:center;color:#5c7287;
z-index:2;font-size:.9rem;
}
.reveal{position:fixed;inset:0;background:#fff;z-index:20;animation:reveal 2s forwards}
@keyframes reveal{100%{opacity:0;visibility:hidden}}
@keyframes intro{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
@keyframes float{50%{transform:translateY(-12px)}}
@keyframes rotate3d{50%{transform:rotateY(8deg) rotateX(3deg)}}
</style>
</head>
<body>
<div class="reveal"></div>
<canvas id="bg"></canvas>
<div class="aurora"></div>

<div class="wrap">

<h1 class="title">TUCKS</h1>

<div class="card">
<div class="tagline">With you in every step of the journey</div>
<p style="margin-top:14px;line-height:1.8">
• The Losix Marketplace • 
</p>
</div>
</div>

<div class="footer">Imagined by the Overseer of Losix Team</div>

<script>
const c=document.getElementById('bg'),x=c.getContext('2d');
let w,h,mx=innerWidth/2,my=innerHeight/2;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
rs();addEventListener('resize',rs);
addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});

const p=[...Array(90)].map(()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+1}));

function loop(){
x.clearRect(0,0,w,h);
let g=x.createRadialGradient(mx,my,0,mx,my,250);
g.addColorStop(0,'rgba(59,167,255,.15)');
g.addColorStop(1,'rgba(59,167,255,0)');
x.fillStyle=g;x.fillRect(0,0,w,h);

for(const a of p){
a.x+=a.vx;a.y+=a.vy;
if(a.x<0||a.x>w)a.vx*=-1;
if(a.y<0||a.y>h)a.vy*=-1;
x.beginPath();x.arc(a.x,a.y,a.r,0,6.28);
x.fillStyle='rgba(59,167,255,.55)';x.fill();
}
for(let i=0;i<p.length;i++)for(let j=i+1;j<p.length;j++){
let d=Math.hypot(p[i].x-p[j].x,p[i].y-p[j].y);
if(d<110){
x.strokeStyle='rgba(59,167,255,'+(0.12-d/110*0.12)+')';
x.beginPath();x.moveTo(p[i].x,p[i].y);x.lineTo(p[j].x,p[j].y);x.stroke();
}}
requestAnimationFrame(loop);
}
loop();


setTimeout(()=>{
localStorage.setItem('tucks_intro_seen','1');
document.body.style.transition='opacity .8s';
document.body.style.opacity='0';
setTimeout(()=>location.href='home.html',800);
},5000);
</script>
</body>
</html>
