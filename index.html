<script>
const c=document.getElementById('bg'),x=c.getContext('2d');
let w,h,mx=innerWidth/2,my=innerHeight/2;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
rs();addEventListener('resize',rs);
addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});

const p=[...Array(90)].map(()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+1}));

function loop(){
x.clearRect(0,0,w,h);
let g=x.createRadialGradient(mx,my,0,mx,my,250);
g.addColorStop(0,'rgba(59,167,255,.15)');
g.addColorStop(1,'rgba(59,167,255,0)');
x.fillStyle=g;x.fillRect(0,0,w,h);

for(const a of p){
a.x+=a.vx;a.y+=a.vy;
if(a.x<0||a.x>w)a.vx*=-1;
if(a.y<0||a.y>h)a.vy*=-1;
x.beginPath();x.arc(a.x,a.y,a.r,0,6.28);
x.fillStyle='rgba(59,167,255,.55)';x.fill();
}
for(let i=0;i<p.length;i++)for(let j=i+1;j<p.length;j++){
let d=Math.hypot(p[i].x-p[j].x,p[i].y-p[j].y);
if(d<110){
x.strokeStyle='rgba(59,167,255,'+(0.12-d/110*0.12)+')';
x.beginPath();x.moveTo(p[i].x,p[i].y);x.lineTo(p[j].x,p[j].y);x.stroke();
}}
requestAnimationFrame(loop);
}
loop();


setTimeout(()=>{
localStorage.setItem('tucks_intro_seen','1');
document.body.style.transition='opacity .8s';
document.body.style.opacity='0';
setTimeout(()=>location.href='home.html',800);
},5000);
</script>
