<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #87CEEB, #1e3a8a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #f3f4f6;
      padding: 40px;
      width: 350px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-height: 90vh;
      overflow-y: auto;
    }

    h2 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
    }

    .link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #1e3a8a;
      text-decoration: none;
      font-weight: bold;
    }

    .error {
      color: red;
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: #999;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ccc;
    }

    .divider::before {
      margin-right: 10px;
    }

    .divider::after {
      margin-left: 10px;
    }

    .social-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .social-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: white;
      color: #333;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .social-btn:hover {
      background: #f0f0f0;
      border-color: #999;
    }

    .google-btn {
      background: white;
      border: 1px solid #ddd;
    }

    .google-btn:hover {
      background: #fafafa;
    }

    .apple-btn {
      background: black;
      color: white;
      border: 1px solid black;
    }

    .apple-btn:hover {
      background: #333;
      border-color: #333;
    }

    .social-icon {
      width: 20px;
      height: 20px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <div class="error" id="error"></div>

  <div class="social-buttons">
    <button type="button" class="social-btn google-btn" onclick="signupWithGoogle()">
      <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </button>
    <button type="button" class="social-btn apple-btn" onclick="signupWithApple()">
      <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.05 13.5c-.91 0-1.82.58-2.56 1.71.74 1.13 1.65 1.71 2.56 1.71 1.63 0 2.95-1.32 2.95-2.95 0-.63-.2-1.22-.58-1.71-.88.68-2.1 1.24-3.37 1.24zm-7.1 0c-1.27 0-2.49-.56-3.37-1.24-.38.49-.58 1.08-.58 1.71 0 1.63 1.32 2.95 2.95 2.95.91 0 1.82-.58 2.56-1.71-.74-1.13-1.65-1.71-2.56-1.71z"/>
        <path d="M17.3.5h-3.3v1.5h3.3c1.93 0 3.5 1.57 3.5 3.5v2.5h1.5V5.5c0-2.76-2.24-5-5-5zm-10.6 0H3.4C1.47.5 0 1.97 0 3.9v15.2C0 21.03 1.47 22.5 3.4 22.5h13.2c1.93 0 3.4-1.47 3.4-3.4V10h-1.5v12.1c0 1.03-.84 1.9-1.9 1.9H3.4c-1.06 0-1.9-.87-1.9-1.9V3.9c0-1.04.84-1.9 1.9-1.9h3.3v1.5H3.4z"/>
      </svg>
      Apple
    </button>
  </div>

  <div class="divider">or</div>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>

  <div class="link">
    Already have an account? <a href="login.html">Login</a>
    <br>Clicking the sign up button means you agree to our <a href="/profile/terms.html">terms and conditions</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  OAuthProvider
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzwnmGgEcN63RcCHSNU6p_xXKxmeqzF6k",
  authDomain: "losixmarket.firebaseapp.com",
  projectId: "losixmarket",
  storageBucket: "losixmarket.firebasestorage.app",
  messagingSenderId: "301860246689",
  appId: "1:301860246689:web:aabf0ab9af41081a91cce0",
  measurementId: "G-ZPVVZ8GNP0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

async function createUserDocument(user) {
  try {
    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      displayName: user.displayName || "",
      walletBalance: 0,
      createdAt: new Date()
    }, { merge: true });
  } catch (error) {
    console.error("Error creating user document:", error);
  }
}

function finalizeAuthRedirect() {
  localStorage.setItem("isLoggedIn", "true");
  window.location.href = "index.html";
}

window.signupWithGoogle = async function () {
  const errorDiv = document.getElementById("error");
  errorDiv.textContent = "";

  try {
    const provider = new GoogleAuthProvider();
    provider.addScope("profile");
    provider.addScope("email");

    const result = await signInWithPopup(auth, provider);
    await createUserDocument(result.user);
    finalizeAuthRedirect();
  } catch (error) {
    if (error.code !== "auth/popup-closed-by-user" && error.code !== "auth/cancelled-popup-request") {
      errorDiv.textContent = error.message;
    }
  }
};

window.signupWithApple = async function () {
  const errorDiv = document.getElementById("error");
  errorDiv.textContent = "";

  try {
    const provider = new OAuthProvider("apple.com");
    provider.addScope("email");
    provider.addScope("name");
    provider.setCustomParameters({ locale: "en" });

    const result = await signInWithPopup(auth, provider);
    await createUserDocument(result.user);
    finalizeAuthRedirect();
  } catch (error) {
    if (error.code !== "auth/popup-closed-by-user" && error.code !== "auth/cancelled-popup-request") {
      errorDiv.textContent = error.message;
    }
  }
};

window.signup = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorDiv = document.getElementById("error");

  errorDiv.textContent = "";

  if (!email || !password) {
    errorDiv.textContent = "Please fill all fields.";
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      walletBalance: 0,
      createdAt: new Date()
    });

    finalizeAuthRedirect();
  } catch (error) {
    errorDiv.textContent = error.message;
  }
};
</script>

</body>
</html>
