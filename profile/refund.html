<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="manifest" href="/manifest.json">
  <link rel="icon" alt="Logo" href="/logo.png">
<meta name="theme-color" content="rgb(128, 128, 128)">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('Service Worker Registered'));
    });
  }
</script>
  <title>Tucks - Refund Request</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }
 

/* Dropdown Menu */
nav {
  position: fixed;
  top: 65px;
  right: 15px;
  width: 180px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  padding: 12px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-15px);
  transition: all 0.3s ease;
}

/* Show when checked */
#menuToggle:checked ~ nav {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

/* Menu links */
nav a {
  display: block;
  padding: 10px;
  text-decoration: none;
  color: #ff6b6b;
  font-weight: 500;
  border-radius: 8px;
  transition: background 0.3s ease, transform 0.2s;
}
nav a:hover {
  background: rgba(255,107,107,0.15);
  transform: translateX(4px);
}

/* Responsive */
@media (max-width: 600px) {
  nav {
    width: 70%;
    right: 15%;
  }
}

   

    .refund-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px #64748b;
    }
    h2 {
      text-align: center;
      color: #2563eb;
    }
    .form-row {
      margin-bottom: 15px;
    }
    .form-row label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .form-row input, .form-row textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid blue;
      border-radius: 6px;
    }
    .submit-btn {
      width: 100%;
      padding: 12px;
      border: none;
      background: orange;
      color: #fff;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    .submit-btn:hover {
      background: orangered;
    }
 

  </style>
</head>
<body>
 
  <div class="refund-container">
 <h2 style="color: blue; font-size: 50px;">Refund Request</h2>
  <div class="refund-container">
    <form id="refundForm">
      <div class="form-row">
   
        <label for="refNumber" style="color: blue;" >Order Reference Number <span style="color:red">*</span></label>
        <input id="refNumber" type="text" required placeholder="Enter your order reference number from your receipt">
      </div>
      </div>
     <div class="refund-container">
      <div class="form-row">
        <label for="customerName" style="color: blue;">Full Name <span style="color:red">*</span></label>
        <input id="customerName" type="text" required placeholder="Enter your full name">
      </div>
      </div>
      <div class="refund-container">
      <div class="form-row">
        <label for="phone" style="color: blue;">Phone Number <span style="color:red">*</span></label>
        <input id="phone" type="tel" required placeholder="Enter your phone number">
      </div>
      </div>
      <div class="refund-container">
      <div class="form-row">
        <label for="email" style="color: blue;">Email <span style="color:red">*</span></label>
        <input id="email" type="email" required placeholder="Enter your email address">
      </div>
      </div>
    <div class="refund-container">
      <div class="form-row">
        <label for="address"  style="color: blue;">Address to Receive Refund <span style="color:red">*</span></label>
        <textarea id="address" rows="3" required placeholder="Enter your full address"></textarea>
      </div>
      </div>
    <div class="refund-container">
      <div class="form-row">
        <label for="refundReason"  style="color: blue;">Reason for Refund (optional)</label>
        <textarea id="refundReason" rows="4" placeholder="Briefly explain why you need a refund"></textarea>
      </div>
      </div>
    <div class="refund-container">
      <div class="form-row">
        <label for="refundImage"  style="color: blue;">Upload Receipt / Product Image <span style="color:red">*</span></label>
        <input id="refundImage" type="file" accept="image/*" required>
      </div>
      </div>
      <div style="padding-bottom: 15px;">
      <code style="color: red;">Your refund will be processed within 7 working days</code>
      <br><strong> Click <a href="/profile/terms.html" style="text-decoration: underline;">here</a> to learn about our refund terms.</strong>
      </div>

      <button type="submit" class="submit-btn">Submit Refund Request</button>
    </form>
  </div>
  </div>
 <script type="module" src="/script.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    // Firebase config (replace with yours)
    const firebaseConfig = {
     apiKey: "AIzaSyDzwnmGgEcN63RcCHSNU6p_xXKxmeqzF6k" ,
    authDomain: "losixmarket.firebaseapp.com",
    projectId: "losixmarket" ,
    storageBucket: "losixmarket.firebasestorage.app",
    messagingSenderId: "301860246689",
    appId:"1:301860246689:web:aabf0ab9af41081a91cce0",
    measurementId: "G-ZPVVZ8GNP0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    document.getElementById("refundForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const refNumber = document.getElementById("refNumber").value.trim();
      const customerName = document.getElementById("customerName").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const address = document.getElementById("address").value.trim();
      const refundReason = document.getElementById("refundReason").value.trim();
      const refundImage = document.getElementById("refundImage").files[0];

      if (!refNumber || !refundImage || !phone || !email || !address || !customerName) {
        alert("❌ Please fill in all required fields and upload an image.");
        return;
      }

      try {
        // Upload image to Firebase Storage
        const imgRef = ref(storage, `refunds/${Date.now()}_${refundImage.name}`);
        await uploadBytes(imgRef, refundImage);
        const imgURL = await getDownloadURL(imgRef);

        // Save refund request to Firestore
        await addDoc(collection(db, "refunds"), {
          refNumber,
          customerName,
          phone,
          email,
          address,
          refundReason,
          imageURL: imgURL,
          createdAt: serverTimestamp(),
          status: "Pending"
        });

        alert("✅ Refund request submitted successfully! We will contact you soon.");
        document.getElementById("refundForm").reset();
      } catch (err) {
        console.error(err);
        alert("❌ Something went wrong. Please try again.");
      }
    });
  </script>
</body>
</html>
